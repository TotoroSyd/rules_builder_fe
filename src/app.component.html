    <ng-container *ngIf="vm$ | async as vm">
      <div class="app-shell">

        <!-- Audience Rules Card -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Audience Rules</span>
            <button
              class="btn-primary"
              [disabled]="vm.searching"
              (click)="searchContacts()"
            >
              <span *ngIf="vm.searching" class="loading-dot"></span>
              {{ vm.searching ? 'Searching…' : 'Search' }}
            </button>
            <button
              class="btn-primary"
              [disabled]="vm.saving"
              (click)="saveRule()"
            >
              <span *ngIf="vm.saving" class="loading-dot"></span>
              {{ vm.saving ? 'Saving…' : 'Save Rule' }}
            </button>
          </div>

          <!-- Rule Group tree (recursive) -->
          <app-rule-group [group]="vm.rootGroup" [nested]="false" />
        </div>

        <!-- Saved Rules -->
        <app-saved-rules [rules]="vm.savedRules" />

        <!-- Matching Contacts -->
        <app-results-display [contacts]="vm.matchingContacts" />

      </div>
    </ng-container>
